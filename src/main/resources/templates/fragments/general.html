<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="baseheader(title)">
    <meta charset="UTF-8">

    <title th:replace="${title}">This is the base title</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
    <link rel="stylesheet" type="text/css" href="/css/style.css"/>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"
     th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand" href="/">LibraryDemo</a>
        <div class="navbar-nav">
            <a class="nav-link"
               th:classappend="${activePage == 'books'} ? 'active' : ''"
               href="/book/all">
                <i class="bi bi-book"></i> Boeken
            </a>
            <a class="nav-link"
               th:classappend="${activePage == 'authors'} ? 'active' : ''"
               href="/author/all">
                <i class="bi bi-person"></i> Auteurs
            </a>
        </div>
    </div>

    <div class="container mt-3">
        <div th:if="${successMessage}"
             class="alert alert-success alert-dismissible fade show"
             role="alert">
            <span th:text="${successMessage}">Actie geslaagd.</span>
            <button type="button" class="btn-close"
                    data-bs-dismiss="alert"
                    aria-label="Sluiten"></button>
        </div>
        <div th:if="${errorMessage}"
             class="alert alert-danger alert-dismissible fade show"
             role="alert">
            <span th:text="${errorMessage}">Er is een fout opgetreden.</span>
            <button type="button" class="btn-close"
                    data-bs-dismiss="alert"
                    aria-label="Sluiten"></button>
        </div>
    </div>
</nav>

<footer class="footer mt-auto py-3 bg-light align-content-center"
        th:fragment="footer">
<span class="text-muted">
&copy;Library Demo - Vincent Velthuizen 2026
</span>
</footer>

<div th:fragment="scripts">
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</div>

</body>
</html>
