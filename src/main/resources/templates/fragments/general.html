<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="baseheader(title)">
    <meta charset="UTF-8">

    <title th:replace="${title}">This is the base title</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
    <link rel="stylesheet" type="text/css" href="/css/style.css"/>
</head>

<body>
<th:block th:fragment="navbar">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid d-flex align-items-center">
        <div class="flex-fill">
            <a class="navbar-brand" href="/">LibraryDemo</a>
        </div>
        <div class="flex-fill d-flex justify-content-center">
            <div class="navbar-nav">
                <a class="nav-link"
                   th:classappend="${activePage == 'books'} ? 'active' : ''"
                   href="/book/all">
                    <i class="bi bi-book"></i> Boeken
                </a>
                <a class="nav-link"
                   th:classappend="${activePage == 'authors'} ? 'active' : ''"
                   href="/author/all">
                    <i class="bi bi-person"></i> Auteurs
                </a>
                <a class="nav-link"
                   th:classappend="${activePage == 'users'} ? 'active' : ''"
                   href="/user/all"
                   sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-person"></i> Gebruikersbeheer
                </a>
            </div>
        </div>
        <div class="flex-fill d-flex justify-content-end align-items-center gap-2">
            <a th:href="@{/user/home}" class="btn btn-outline-light btn-sm"
               sec:authorize="isAuthenticated()">Mijn pagina</a>
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="m-0">
                <button class="btn btn-outline-light btn-sm" type="submit">Uitloggen</button>
            </form>
            <a th:href="@{/login}" class="btn btn-outline-light btn-sm" sec:authorize="isAnonymous()">Inloggen</a>
        </div>
    </div>
</nav>
<div class="container mt-3">
    <div th:if="${successMessage}"
         class="alert alert-success alert-dismissible fade show"
         role="alert">
        <span th:text="${successMessage}">Actie geslaagd.</span>
        <button type="button" class="btn-close"
                data-bs-dismiss="alert"
                aria-label="Sluiten"></button>
    </div>
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show"
         role="alert">
        <span th:text="${errorMessage}">Er is een fout opgetreden.</span>
        <button type="button" class="btn-close"
                data-bs-dismiss="alert"
                aria-label="Sluiten"></button>
    </div>
</div>
</th:block>

<footer class="footer mt-auto py-3 bg-light text-center"
        th:fragment="footer">
<span class="text-muted">
&copy;Library Demo - Vincent Velthuizen 2026
</span>
</footer>

<div th:fragment="scripts">
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</div>


</body>
</html>
