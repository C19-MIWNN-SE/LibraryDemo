<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<div th:fragment="bookCards(books)" class="row row-cols-6 g-5">
    <div th:each="book : ${books}" th:insert="~{fragments/book :: bookCard(${book})}"></div>
</div>

<div th:fragment="bookCardsNew(books)" class="row row-cols-6 g-4">
    <div th:each="book : ${books}" th:insert="~{fragments/book :: bookCard(${book})}"></div>

    <div>
        <div class="col h-100">
            <div class="card h-100">
                <div class="card-body align-content-center text-center">
                    <a th:href="@{/book/add}">Add a new book</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:fragment="bookCard(book)" class="col h-100">
    <!--/*@thymesVar id="book" type="nl.miwnn.ch19.vincent.LibraryDemo.model.Book"*/-->

    <div class="card h-100">
        <a th:href="@{/book/detail/{title}(title = ${book.title})}">
            <img height="275" th:src="${book.coverImageUrl}" class="card-img-top object-fit-cover" th:alt="|Cover image for ${book.title}|">
        </a>
        <div class="card-body text-center bg-body-secondary d-flex flex-column">
            <a th:href="@{/book/detail/{title}(title = ${book.title})}">
                <h5 class="card-title" th:text="${book.title}"></h5>
            </a>
            <a th:if="${book.genre != null}"
               th:href="@{/genre/{sn}(sn=${book.genre.shortName})}"
               th:text="${book.genre.shortName}"
               class="badge text-bg-secondary text-decoration-none mt-auto align-self-center"></a>
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item" th:each="author : ${book.authors}">
                <a th:href="@{/author/detail/{lastName}/{firstName}(lastName=${author.lastName}, firstName=${author.firstName})}"
                   th:text="${author.fullName}"></a>
            </li>
        </ul>
        <div class="card-footer">
            <h6 class="card-subtitle text-center">
                <span th:text="${book.availableNumberOfCopies}"></span> beschikbaar van <span th:text="${book.numberOfCopies}"></span>
            </h6>
        </div>
    </div>
</div>

<div th:fragment="borrowedCopyCard(copy)" class="col h-100">
    <!--/*@thymesVar id="copy" type="nl.miwnn.ch19.vincent.LibraryDemo.model.Copy"*/-->

    <div class="card h-100">
        <a th:href="@{/book/detail/{title}(title=${copy.book.title})}">
            <img height="275" th:src="${copy.book.coverImageUrl}" class="card-img-top object-fit-cover"
                 th:alt="|Cover image for ${copy.book.title}|">
        </a>
        <div class="card-body text-center bg-body-secondary">
            <a th:href="@{/book/detail/{title}(title=${copy.book.title})}">
                <h5 class="card-title" th:text="${copy.book.title}"></h5>
            </a>
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item" th:each="author : ${copy.book.authors}">
                <a th:href="@{/author/detail/{id}(id=${author.id})}" th:text="${author.fullName}"></a>
            </li>
        </ul>
        <div class="card-footer text-center">
            <small class="text-muted d-block mb-2" th:text="|${copy.daysOut} dag(en) geleend|"></small>
            <form th:action="@{/user/home/return/{id}(id=${copy.id})}" method="post">
                <button type="submit" class="btn btn-warning btn-sm w-100">Terugbrengen</button>
            </form>
        </div>
    </div>
</div>

<form th:fragment="bookForm(formBook, formId)"
      th:id="${formId}"
      th:action="@{/book/save}"
      method="post"
      th:object="${formBook}">
    <!--/*@thymesVar id="formBook" type="nl.miwnn.ch19.vincent.LibraryDemo.model.Book"*/-->

    <input type="hidden" th:field="*{id}">

    <div class="mb-3">
        <label for="title" class="form-label">Titel</label>
        <input type="text" id="title" class="form-control" th:field="*{title}"/>
        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </div>

    <div class="mb-3">
        <label for="authors" class="form-label">Auteurs</label>
        <select id="authors" class="form-select" th:field="*{authors}" multiple>
            <option th:each="author : ${allAuthors}"
                    th:value="${author.id}"
                    th:text="${author.fullName}">
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label for="publicationYear" class="form-label">Publicatiejaar</label>
        <input id="publicationYear" class="form-control" th:field="*{publicationYear}"/>
        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('publicationYear')}" th:errors="*{publicationYear}"></div>
    </div>

    <div class="mb-3">
        <label for="genre" class="form-label">Genre</label>
        <select id="genre" name="genre" class="form-select">
            <option value="">— Geen —</option>
            <option th:each="genre : ${allGenres}"
                    th:value="${genre.id}"
                    th:text="${genre.name}"
                    th:selected="${formBook.genre != null and formBook.genre.id == genre.id}">
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label for="coverImageUrl" class="form-label">URL omslagafbeelding</label>
        <input type="url" id="coverImageUrl" class="form-control"
               th:field="*{coverImageUrl}" placeholder="https://...">
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Beschrijving</label>
        <textarea id="description" class="form-control"
                  th:field="*{description}" rows="5"
                  placeholder="Optionele beschrijving van het boek">
        </textarea>
    </div>
</form>
