<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Boek toevoegen — LibraryDemo</title>
</head>
<body>
<h1>Boek toevoegen</h1>
<form th:action="@{/books/add}" th:object="${book}" method="post">
    <div>
        <label for="title">Titel</label>
        <input type="text" id="title" th:field="*{title}">
    </div>
    <div>
        <label for="authorName">Auteur</label>
        <input type="text" id="authorName" th:field="*{authorName}">
    </div>
    <div>
        <label for="publicationYear">Publicatiejaar</label>
        <input type="number" id="publicationYear"
               th:field="*{publicationYear}">
    </div>
    <button type="submit">Toevoegen</button>
</form>
<p><a th:href="@{/books}">Terug naar het overzicht</a></p>
</body>
</html>
