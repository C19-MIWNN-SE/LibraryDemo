<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content})}">
<head><title th:text="${author.fullName}">Auteur</title></head>
<body>
<div id="content">
    <div class="row flex-lg-row-reverse align-items-center g-5 py-3">
        <div class="col-8 col-sm-6 col-lg-3 text-center">
            <img th:if="${author.image != null}"
                 th:src="@{/images/{id}(id=${author.image.id})}"
                 th:alt="|Foto van ${author.fullName}|"
                 class="img-fluid cirkel w-75">
        </div>
        <div class="col-lg-9">
            <h1 class="display-5 fw-bold lh-1 mb-3" th:text="${author.fullName}"></h1>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-warning"
                        data-bs-toggle="modal"
                        data-bs-target="#editAuthorModal"
                        sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-pencil"></i> Bewerken
                </button>
                <form th:action="@{/author/delete/{id}(id=${author.id})}" method="post"
                      class="m-0" sec:authorize="hasRole('ADMIN')">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Verwijderen
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/author :: editAuthorModal(${formAuthor}, 'editAuthorForm')}"></div>

    <h2 class="mt-4 mb-3">Boeken</h2>
    <div th:replace="~{fragments/book :: bookCards(${author.books})}"></div>
</div>
</body>
</html>
