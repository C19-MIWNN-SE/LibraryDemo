<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title>Boekenoverzicht</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container mt-4">
    <h1 class="mb-3">Boekenoverzicht</h1>

    <form method="get" action="/book/all" class="d-flex justify-content-center mb-3">
        <input id="search" type="text" name="query"
               th:value="${query}"
               aria-labelledby="search-btn"
               placeholder="Zoek op titel..."
               class="form-control me-2 w-auto"/>
        <button id="search-btn" type="submit" class="btn btn-primary">Zoeken</button>
    </form>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Titel</th>
                <th>Genre</th>
                <th>Auteur</th>
                <th>Jaar</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${allBooks}">
                <td>
                    <a th:href="@{/book/{title}(title=${book.title})}"
                       th:text="${book.title}">
                        Titel
                    </a>
                </td>
                <td>
                    <span class="badge" th:text="${book.genre}">Genre</span>
                </td>
                <td>
                    <span th:each="author, iterStat : ${book.authors}">
                        <span th:text="${author.fullName}"></span><span th:if="!${iterStat.last}">, </span>
                    </span>
                </td>
                <td th:text="${book.publicationYear}"></td>
            </tr>
        </tbody>
    </table>
    <p><a th:href="@{/book/add}">Nieuw boek toevoegen</a></p>
</div>

<footer th:replace="~{fragments/general :: footer}"></footer>

<div th:replace="~{fragments/general :: scripts}"></div>
</body>
</html>
