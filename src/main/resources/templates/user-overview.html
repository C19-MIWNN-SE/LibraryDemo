<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content})}">
<head><title>Gebruikersoverzicht</title></head>
<body>
<div id="content">
    <h1 class="mb-3">Gebruikersoverzicht</h1>

    <table class="table">
        <thead>
        <tr>
            <th>Gebruikersnaam</th>
            <th>Rol</th>
            <th>Acties</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.username}"></td>
            <td th:text="|${user.administrator ? 'Beheerder' : 'Gebruiker'}|"></td>
            <td sec:authorize="hasRole('ADMIN')" class="d-flex gap-2">
                <form th:action="@{/user/reset-password/{id}(id=${user.id})}" method="post">
                    <button type="submit" class="btn btn-warning btn-sm">Wachtwoord resetten</button>
                </form>
                <form th:action="@{/user/delete/{id}(id=${user.id})}" method="post">
                    <button type="submit" class="btn btn-danger btn-sm">Verwijderen</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/user/add}" class="btn btn-primary">
        Nieuwe gebruiker
    </a>
</div>
</body>
</html>
