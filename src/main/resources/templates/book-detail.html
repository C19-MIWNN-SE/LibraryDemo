<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title th:text="|Details van ${book.title}|">Title</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container">
    <h1 th:text="|Details van ${book.title}|"></h1>

    <p>
        Dit boek is geschreven door:
        <span th:each="author, iterStat : ${book.authors}">
            <span th:text="${author.fullName}"></span><span th:if="!${iterStat.last}">, </span>
        </span>
        en is uitgegeven in <span th:text="${book.publicationYear}"></span>
    </p>

    <ul>
        <li>
            <a th:href="@{/book/edit/{title}(title=${book.title})}">Bewerk dit boek</a>
        </li>
        <li>
            <a th:href="@{/book/delete/{title}(title=${book.title})}">Verwijder dit boek</a>
        </li>
        <li>
            <a th:href="@{/book/add-copy/{title}(title=${book.title})}">Koop exemplaar</a>
        </li>
    </ul>

    <h2>Exemplaren</h2>
    <table>
        <thead>
        <tr>
            <th>Exemplaar</th>
            <th>Status</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="copy : ${book.copies}">
            <td th:text="${copy.id}">1</td>
            <td th:text="${copy.available} ? 'Beschikbaar' : 'Uitgeleend'">
                Status
            </td>
            <td>
                <form th:if="${copy.available}"
                      th:action="@{/copies/borrow/{id}(id=${copy.id})}"
                      method="post">
                    <button type="submit">Lenen</button>
                </form>
                <form th:unless="${copy.available}"
                      th:action="@{/copies/return/{id}(id=${copy.id})}"
                      method="post">
                    <button type="submit">Terugbrengen</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<footer th:replace="~{fragments/general :: footer}"></footer>

<div th:replace="~{fragments/general :: scripts}"></div>
</body>
</html>
