<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title th:text="${paginaTitel}">Boek wijzigen of toevoegen</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>
    <form th:action="@{/book/save}" method="post"
          th:object="${book}">
        <input type="hidden" th:field="*{id}">
        <div>
            <label for="title">Titel</label>
            <input type="text" id="title" th:field="*{title}"/>
            <span th:if="${#fields.hasErrors('title')}"
                  th:errors="*{title}"
                  class="error">
            </span>
        </div>
        <div>
            <label for="authors">Auteurs</label>
            <select id="authors" th:field="*{authors}" multiple>
                <option th:each="author : ${allAuthors}"
                        th:value="${author.id}"
                        th:text="${author.fullName}">
                </option>
            </select>
        </div>
        <div>
            <label for="publicationYear">Publicatiejaar</label>
            <input id="publicationYear"
                   th:field="*{publicationYear}"/>
            <span th:if="${#fields.hasErrors('publicationYear')}"
                  th:errors="*{publicationYear}"
                  class="error">
            </span>
        </div>
        <button type="submit">Opslaan</button>
    </form>
    <br/>
    <p><a th:href="@{/book/all}">Terug naar het overzicht</a></p>

<footer th:replace="~{fragments/general :: footer}"></footer>
</body>
</html>
