<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content})}">
<head><title>Boek wijzigen of toevoegen</title></head>
<body>
<div id="content">
    <h1 class="mb-3" th:if="${formBook.id == null}">Voeg nieuw boek toe</h1>
    <h1 class="mb-3" th:unless="${formBook.id == null}">Pas <span th:text="${formBook.title}"></span> aan</h1>

    <div class="col-lg-6"
         th:replace="~{fragments/book :: bookForm(${formBook}, 'bookForm')}">
    </div>

    <div class="mt-3">
        <button type="submit" form="bookForm" class="btn btn-primary">Opslaan</button>
        <a onclick="history.back()" class="btn btn-secondary">Annuleren</a>
    </div>
</div>
</body>
</html>
