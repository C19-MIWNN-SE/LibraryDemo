<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${paginaTitel}">Boekenoverzicht</title>
</head>
<body>
    <h1 th:text="${paginaTitel}">Boekenoverzicht</h1>

    <table>
        <thead>
            <tr>
                <th>Titel</th>
                <th>Auteur</th>
                <th>Jaar</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${allBooks}">
                <td th:text="${book.title}"></td>
                <td th:text="${book.authorName}"></td>
                <td th:text="${book.publicationYear}"></td>
            </tr>
        </tbody>
    </table>
    <p><a th:href="@{/books/add}">Nieuw boek toevoegen</a></p>
</body>
</html>
