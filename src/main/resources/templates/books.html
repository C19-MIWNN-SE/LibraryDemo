<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${paginaTitel}">Boekenoverzicht</title>
</head>
<body>
    <h1 th:text="${paginaTitel}">Boekenoverzicht</h1>

    <form method="get" action="/books">
        <input type="text" name="query"
               th:value="${query}"
               placeholder="Zoek op titel..."/>
        <button type="submit">Zoeken</button>
    </form>

    <br/>

    <table>
        <thead>
            <tr>
                <th>Titel</th>
                <th>Auteur</th>
                <th>Jaar</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${allBooks}">
                <td th:text="${book.title}"></td>
                <td th:text="${book.authorName}"></td>
                <td th:text="${book.publicationYear}"></td>
                <td>
                    <a th:href="@{/books/delete/{title}(title=${book.title})}">
                        Verwijderen
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
    <p><a th:href="@{/books/add}">Nieuw boek toevoegen</a></p>
</body>
</html>
