<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${paginaTitel}">Boekenoverzicht</title>
</head>
<body>
    <h1 th:text="${paginaTitel}">Boekenoverzicht</h1>

    <form method="get" action="/books">
        <input type="text" name="query"
               th:value="${query}"
               placeholder="Zoek op titel..."/>
        <button type="submit">Zoeken</button>
    </form>

    <br/>

    <table>
        <thead>
            <tr>
                <th>Titel</th>
                <th>Auteur</th>
                <th>Jaar</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${allBooks}">
                <td>
                    <a th:href="@{/book/{bookId}(bookId=${book.id})}"
                       th:text="${book.title}">
                        Titel
                    </a>
                </td>
                <td th:text="${book.authorName}"></td>
                <td th:text="${book.publicationYear}"></td>
                <td>
                    <a th:href="@{/books/edit/{bookId}(bookId=${book.id})}">
                        Bewerken
                    </a>
                    <a th:href="@{/books/delete/{bookId}(bookId=${book.id})}">
                        Verwijderen
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
    <p><a th:href="@{/books/new}">Nieuw boek toevoegen</a></p>

    <br/>
    <div th:if="${successMessage}"
         class="alert alert-success">
        <span th:text="${successMessage}">Opgeslagen!</span>
    </div>
</body>
</html>
