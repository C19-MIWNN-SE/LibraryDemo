<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content})}">
<head><title>Mijn pagina</title></head>
<body>
<div id="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 th:text="|Welcome, ${#authentication.name}|"></h1>
        <a th:href="@{/user/change-password}"
           class="btn btn-outline-secondary">Change password</a>
    </div>

    <h2 class="mb-3">Currently borrowed</h2>
    <p th:if="${#lists.isEmpty(activeLoans)}" class="text-muted">
        You currently have no borrowed books.
    </p>
    <div class="row row-cols-6 g-4" th:unless="${#lists.isEmpty(activeLoans)}">
        <div th:each="loan : ${activeLoans}"
             th:insert="~{fragments/book :: activeLoanCard(${loan})}"></div>
    </div>

    <h2 class="mb-3 mt-5">Recently returned</h2>
    <p th:if="${#lists.isEmpty(recentLoans)}" class="text-muted">
        No return history yet.
    </p>
    <div class="row row-cols-6 g-4" th:unless="${#lists.isEmpty(recentLoans)}">
        <div th:each="loan : ${recentLoans}"
             th:insert="~{fragments/book :: recentLoanCard(${loan})}"></div>
    </div>
</div>
</body>
</html>
