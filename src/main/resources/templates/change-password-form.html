<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content})}">
<head><title>Wachtwoord wijzigen</title></head>
<body>
<div id="content">
    <h1>Wachtwoord wijzigen</h1>
    <form th:action="@{/user/change-password}" method="post"
          th:object="${changePassword}">
        <div class="mb-3">
            <label for="currentPassword" class="form-label">Huidig wachtwoord</label>
            <input type="password" id="currentPassword"
                   class="form-control" th:field="*{currentPassword}" required/>
            <div class="text-danger" th:if="${#fields.hasErrors('currentPassword')}"
                 th:errors="*{currentPassword}"></div>
        </div>
        <div class="mb-3">
            <label for="newPassword" class="form-label">Nieuw wachtwoord</label>
            <input type="password" id="newPassword"
                   class="form-control" th:field="*{newPassword}" required/>
        </div>
        <div class="mb-3">
            <label for="checkPassword" class="form-label">Nieuw wachtwoord bevestigen</label>
            <input type="password" id="checkPassword"
                   class="form-control" th:field="*{checkPassword}" required/>
            <div class="text-danger" th:if="${#fields.hasErrors('checkPassword')}"
                 th:errors="*{checkPassword}"></div>
        </div>
        <button type="submit" class="btn btn-primary">Wijzigen</button>
        <a th:href="@{/book/all}" class="btn btn-secondary">Annuleren</a>
    </form>
</div>
</body>
</html>
