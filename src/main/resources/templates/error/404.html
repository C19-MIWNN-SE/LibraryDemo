<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title>Vervang deze titel!</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container">
    <h1>404</h1>

    <p>
        Het spijt me maar u heeft iets opgevraagd wat wij niet hebben kunnen vinden.
        Ik weet niet precies wat er mis ging, wat ik wel weet is het volgende:
    </p>

    <p th:text="${message}"></p>

    <p>
        Mocht u niet weten wat u nu moet doen dan zou ik voorstellen om naar de overzichtspagina te gaan.
        <a th:href="@{/book/all}">Overzichtspagina van alle boeken</a>.
    </p>

</div>

<footer th:replace="~{fragments/general :: footer}"></footer>

<div th:replace="~{fragments/general :: scripts}"></div>
</body>
</html>
